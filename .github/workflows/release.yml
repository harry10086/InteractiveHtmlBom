name: Release KiCad PCM Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.11.2)"
        required: true
        default: "v2.11.2"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Determine tag & version ──────────────────────────────────────────
      - name: Resolve tag and version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # KiCad PCM requires version format: ^\d{1,4}(\.\d{1,4}(\.\d{1,6})?)?$
          # Extract only the numeric MAJOR.MINOR.PATCH part (strip leading v and any suffix like -zh)
          VERSION=$(echo "${TAG}" | grep -oP '\d+\.\d+\.\d+' | head -1)
          if [ -z "${VERSION}" ]; then
            VERSION=$(echo "${TAG#v}" | grep -oP '^\d+(\.\d+)?' | head -1)
          fi
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}, PCM Version: ${VERSION}"

      # ── Build PCM zip ────────────────────────────────────────────────────
      - name: Build PCM zip
        id: build
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          ZIPNAME="InteractiveHtmlBom_${TAG}_pcm.zip"

          mkdir -p staging/plugins staging/resources dist

          # Copy plugin (exclude __pycache__ and .ini)
          rsync -a --exclude='__pycache__' --exclude='*.ini' \
            InteractiveHtmlBom/ staging/plugins/

          # Copy icon
          cp -r releases/resources/. staging/resources/

          # Update version in metadata.json then copy to staging
          python3 - <<EOF
          import json
          path = "releases/metadata.json"
          d = json.load(open(path))
          d["versions"][0]["version"] = "${VERSION}"
          json.dump(d, open(path, "w"), indent=4, ensure_ascii=False)
          EOF
          cp releases/metadata.json staging/metadata.json

          # Create zip from staging contents
          (cd staging && zip -r "../dist/${ZIPNAME}" .)

          SHA256=$(sha256sum dist/${ZIPNAME} | awk '{print $1}')
          SIZE=$(stat -c%s dist/${ZIPNAME})
          INSTALL_SIZE=$(unzip -l dist/${ZIPNAME} | tail -1 | awk '{print $1}')

          echo "zip_name=${ZIPNAME}"         >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}"            >> "$GITHUB_OUTPUT"
          echo "size=${SIZE}"                >> "$GITHUB_OUTPUT"
          echo "install_size=${INSTALL_SIZE}" >> "$GITHUB_OUTPUT"
          echo "Built: ${ZIPNAME} (sha256=${SHA256}, size=${SIZE})"

      # ── Construct download URL (no fromJson needed) ──────────────────────
      - name: Compute asset download URL
        id: asset_url
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${{ steps.version.outputs.tag }}"
          ZIPNAME="${{ steps.build.outputs.zip_name }}"
          URL="https://github.com/${OWNER}/${REPO}/releases/download/${TAG}/${ZIPNAME}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Download URL: ${URL}"

      # ── GitHub Release ───────────────────────────────────────────────────
      - name: Create GitHub Release and upload PCM zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "InteractiveHtmlBom ${{ steps.version.outputs.tag }} (中文版)"
          body: |
            ## InteractiveHtmlBom ${{ steps.version.outputs.tag }} 中文版

            ### 通过 KiCad PCM 安装（推荐）
            在 KiCad 插件管理器 → 管理库链接 中添加：
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/repository.json
            ```

            ### 手动安装
            下载附件 `${{ steps.build.outputs.zip_name }}`，
            在 KiCad 插件管理器中选择"从文件安装"。
          files: dist/${{ steps.build.outputs.zip_name }}
          draft: false
          prerelease: false

      # ── Generate and publish repository.json / packages.json ─────────────
      - name: Generate PCM repository metadata
        env:
          VERSION:      ${{ steps.version.outputs.version }}
          TAG:          ${{ steps.version.outputs.tag }}
          DOWNLOAD_URL: ${{ steps.asset_url.outputs.url }}
          SHA256:       ${{ steps.build.outputs.sha256 }}
          SIZE:         ${{ steps.build.outputs.size }}
          INSTALL_SIZE: ${{ steps.build.outputs.install_size }}
          REPO:         ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, hashlib, subprocess, pathlib
          from datetime import datetime, timezone

          repo         = os.environ["REPO"]
          version      = os.environ["VERSION"]
          download_url = os.environ["DOWNLOAD_URL"]
          sha256       = os.environ["SHA256"]
          size         = int(os.environ["SIZE"])
          install_size = int(os.environ.get("INSTALL_SIZE", "0"))

          # Base metadata
          meta = json.load(open("releases/metadata.json"))

          # Build full package entry
          entry = dict(meta)
          entry["versions"] = [{
              "version":       version,
              "status":        "stable",
              "kicad_version": "7.0",
              "download_sha256": sha256,
              "download_size":   size,
              "download_url":    download_url,
              "install_size":    install_size,
          }]

          # Try to merge with existing packages.json on gh-pages
          subprocess.run(["git", "fetch", "origin", "gh-pages"],
                         capture_output=True)
          r = subprocess.run(
              ["git", "show", "origin/gh-pages:packages.json"],
              capture_output=True, text=True)
          if r.returncode == 0:
              existing = json.loads(r.stdout)
              pkg_list = [
                  p for p in existing.get("packages", [])
                  # Remove old entries for our package AND any entries with invalid/empty sha256
                  if p.get("identifier") != meta["identifier"]
                  and all(
                      v.get("download_sha256", "") not in ("", "0", None)
                      for v in p.get("versions", [])
                  )
              ]
          else:
              pkg_list = []
          pkg_list.insert(0, entry)

          out = pathlib.Path("gh-pages-out")
          out.mkdir(exist_ok=True)

          packages = {"packages": pkg_list}
          (out / "packages.json").write_text(
              json.dumps(packages, indent=2, ensure_ascii=False), encoding="utf-8")

          # repository.json
          pkg_bytes  = (out / "packages.json").read_bytes()
          pkg_sha256 = hashlib.sha256(pkg_bytes).hexdigest()
          now = datetime.now(timezone.utc)
          repo_json = {
              "name": "harry10086 KiCad 插件库 (InteractiveHtmlBom 中文版)",
              "maintainer": {
                  "name": "harry10086",
                  "contact": {"web": f"https://github.com/{repo}"}
              },
              "packages": {
                  "url": f"https://raw.githubusercontent.com/{repo}/gh-pages/packages.json",
                  "sha256": pkg_sha256,
                  "update_timestamp": int(now.timestamp()),
                  "update_time_utc":  now.strftime("%Y-%m-%d %H:%M:%S"),
              }
          }
          (out / "repository.json").write_text(
              json.dumps(repo_json, indent=2, ensure_ascii=False), encoding="utf-8")

          # index.html
          html = f"""<!DOCTYPE html>
          <html lang="zh-CN">
          <head><meta charset="UTF-8">
          <title>InteractiveHtmlBom KiCad 插件库</title></head>
          <body>
          <h1>InteractiveHtmlBom 中文版 KiCad 插件库</h1>
          <p>在 KiCad 插件管理器 → 管理库链接 中添加：</p>
          <pre>https://raw.githubusercontent.com/{repo}/gh-pages/repository.json</pre>
          <p>最新版本：<strong>{version}</strong></p>
          </body></html>"""
          (out / "index.html").write_text(html, encoding="utf-8")

          print("packages.json, repository.json, index.html written to gh-pages-out/")
          PYEOF

      - name: Deploy to gh-pages branch
        run: |
          cd gh-pages-out
          git init -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update PCM repository for ${{ steps.version.outputs.tag }}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages:gh-pages
